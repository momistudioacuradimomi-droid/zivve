<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento completato — ZIVVE</title>
<style>
  body{margin:0;background:#03030a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;text-align:center;padding:24px;box-sizing:border-box}
  .icon{font-size:64px;margin-bottom:16px}
  h1{font-size:20px;color:#4af0d0;letter-spacing:.2em;margin-bottom:8px}
  #status{font-size:12px;color:rgba(200,220,255,.6);letter-spacing:.1em;margin-bottom:24px;line-height:1.8}
  .spinner{width:32px;height:32px;border:3px solid rgba(74,240,208,.2);border-top-color:#4af0d0;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="icon">🎉</div>
<h1>PAGAMENTO COMPLETATO</h1>
<div id="status">Sblocco la tua sfera...</div>
<div class="spinner" id="spinner"></div>

<script>
const FIREBASE_URL = 'https://zivve-game-default-rtdb.europe-west1.firebasedatabase.app';
const GAME_URL = 'https://momistudioacuradimomi-droid.github.io/zivve/';

function log(msg){ document.getElementById('status').innerHTML += '<br>' + msg; }

async function unlockAndRedirect(){
  const pName = localStorage.getItem('drift_name')||'';
  log('Nome: ' + (pName||'non trovato'));

  if(!pName || pName === 'ZIVVER'){
    log('Nome non valido — reindirizzo...');
    setTimeout(()=>{ window.location.href = GAME_URL; }, 2000);
    return;
  }

  const safe = encodeURIComponent(pName.toUpperCase()).replace(/%/g,'_');
  log('Cerco su Firebase: payments/' + safe + '/orbs');

  let unlocked = false;
  for(let i=0; i<10; i++){
    try{
      const res = await fetch(FIREBASE_URL+'/payments/'+safe+'/orbs.json?_='+Date.now());
      const data = res.ok ? await res.json() : null;
      log('Tentativo '+(i+1)+': '+(data?JSON.stringify(Object.keys(data)):'null'));

      if(data && typeof data==='object'){
        const saved = JSON.parse(localStorage.getItem('drift_owned')||'["cyan","blue","white"]');
        let changed = false;
        Object.keys(data).forEach(function(orbId){
          if(data[orbId].unlocked===true && !saved.includes(orbId)){
            saved.push(orbId);
            changed = true;
            unlocked = true;
            log('✅ Sfera sbloccata: ' + orbId);
          }
        });
        if(changed){
          localStorage.setItem('drift_owned', JSON.stringify(saved));
          localStorage.setItem('drift_payment_success','1');
        }
        if(unlocked) break;
      }
    }catch(e){ log('Errore: '+e.message); }
    await new Promise(r=>setTimeout(r,1000));
  }

  localStorage.removeItem('drift_stripe_pending');
  if(!unlocked) log('⚠️ Sfera non trovata — torno al gioco comunque');
  log('Reindirizzo al gioco...');
  setTimeout(()=>{ window.location.href = GAME_URL; }, 1500);
}

unlockAndRedirect();
</script>
</body>
</html>
