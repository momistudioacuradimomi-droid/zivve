<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento completato — ZIVVE</title>
<style>
  body{margin:0;background:#03030a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;text-align:center;padding:24px;box-sizing:border-box}
  .icon{font-size:64px;margin-bottom:16px}
  h1{font-size:20px;color:#4af0d0;letter-spacing:.2em;margin-bottom:8px}
  p{font-size:13px;color:rgba(200,220,255,.6);letter-spacing:.1em;margin-bottom:24px}
  .spinner{width:32px;height:32px;border:3px solid rgba(74,240,208,.2);border-top-color:#4af0d0;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="icon">🎉</div>
<h1>PAGAMENTO COMPLETATO</h1>
<p>Sblocco in corso...</p>
<div class="spinner"></div>

<script>
const FIREBASE_URL = 'https://zivve-game-default-rtdb.europe-west1.firebasedatabase.app';
const GAME_URL = 'https://momistudioacuradimomi-droid.github.io/zivve/';

function getCurrentMonth(){
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

async function unlockAndRedirect(){
  try{
    const pName = localStorage.getItem('drift_name')||'';
    if(pName && pName !== 'ZIVVER'){
      const safe = encodeURIComponent(pName.toUpperCase()).replace(/%/g,'_');

      for(let i=0; i<10; i++){
        // Controlla sfere
        const resOrbs = await fetch(FIREBASE_URL+'/payments/'+safe+'/orbs.json?_='+Date.now());
        const orbs = resOrbs.ok ? await resOrbs.json() : null;
        if(orbs && typeof orbs==='object'){
          const saved = JSON.parse(localStorage.getItem('drift_owned')||'["cyan","blue","white"]');
          let changed = false;
          Object.keys(orbs).forEach(function(orbId){
            if(orbs[orbId].unlocked===true && !saved.includes(orbId)){
              saved.push(orbId);
              changed = true;
            }
          });
          if(changed){
            localStorage.setItem('drift_owned', JSON.stringify(saved));
            localStorage.setItem('drift_payment_success','1');
            break;
          }
        }

        // Controlla Battle Pass
        const month = getCurrentMonth();
        const resBP = await fetch(FIREBASE_URL+'/payments/'+safe+'/bp/'+month+'.json?_='+Date.now());
        const bp = resBP.ok ? await resBP.json() : null;
        if(bp && bp.activated===true){
          localStorage.setItem('zivve_bp_'+month,'1');
          localStorage.setItem('drift_payment_success','1');
          break;
        }

        await new Promise(r=>setTimeout(r,1000));
      }
    }
  }catch(e){ console.log('error:', e); }

  localStorage.removeItem('drift_stripe_pending');
  window.location.href = GAME_URL;
}

unlockAndRedirect();
</script>
</body>
</html>
